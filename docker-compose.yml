services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - media:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CARBON_DOMAIN: ${CARBON_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
      API_PORT: ${API_PORT}
      ADMIN_PORT: ${ADMIN_PORT}
      FRONTEND_PORT: ${FRONTEND_PORT}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carbon
      POSTGRES_USER: carbon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbon"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/mpfrazer/carbon-cms-api:${CARBON_VERSION:-latest}
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://carbon:${POSTGRES_PASSWORD}@db:5432/carbon
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: http://api:${API_PORT}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      MEDIA_DIR: /srv/media
      CARBON_PUBLIC_URL: ${CARBON_PUBLIC_URL}
      CARBON_ALLOWED_ORIGINS: ${CARBON_ALLOWED_ORIGINS:-}
      NODE_ENV: production
      PORT: ${API_PORT}
      HOSTNAME: 0.0.0.0
    volumes:
      - media:/srv/media
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 explicitly: the container's /etc/hosts maps `localhost`
      # to both 127.0.0.1 and ::1, busybox wget tries ::1 first, and the Next
      # server binds 0.0.0.0 (IPv4 only) — so a `localhost` probe fails with
      # "Connection refused" and the service never becomes healthy.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT}/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  admin:
    image: ghcr.io/mpfrazer/carbon-cms-admin:${CARBON_VERSION:-latest}
    build:
      context: .
      dockerfile: packages/admin/Dockerfile
    environment:
      CARBON_API_URL: http://api:${API_PORT}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: https://admin.${CARBON_DOMAIN}
      NODE_ENV: production
      PORT: ${ADMIN_PORT}
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  frontend:
    image: ghcr.io/mpfrazer/carbon-cms-frontend:${CARBON_VERSION:-latest}
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    environment:
      CARBON_API_URL: http://api:${API_PORT}
      NEXTAUTH_URL: https://${CARBON_DOMAIN}
      NODE_ENV: production
      PORT: ${FRONTEND_PORT}
      HOSTNAME: 0.0.0.0
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
  media:
  caddy_data:
  caddy_config:
